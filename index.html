<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hari Ayah 💖</title>

<style>
    body {
        margin: 0;
        font-family: 'Comic Sans MS', cursive;
        background-color: black;
        color: pink;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
    }

    .container {
        background: #111;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 0 20px pink;
    }

    h1 {
        font-size: 28px;
    }

    .sticker {
        font-size: 40px;
        margin: 10px;
    }

    .buttons {
        margin-top: 20px;
        position: relative;
    }

    button {
        padding: 12px 25px;
        border: none;
        border-radius: 20px;
        font-size: 16px;
        cursor: pointer;
        margin: 10px;
        transition: 0.3s;
    }

    #yesBtn {
        background-color: pink;
        color: black;
    }

    #noBtn {
        background-color: #333;
        color: pink;
        position: absolute;
    }

    #message {
        margin-top: 20px;
        font-size: 20px;
        display: none;
    }
</style>
</head>

<body>

<div class="container">
    <div class="sticker">👨‍👧 💖 🎁</div>
    <h1>Apakah Ayah adalah Superhero terbaik? 🦸‍♂️</h1>

    <div class="buttons">
        <button id="yesBtn">Yes 💕</button>
        <button id="noBtn">No 😅</button>
    </div>

    <div id="message">
        Yesss! Ayah memang pahlawan terbaik! 💖👨‍👧<br>
        Terima kasih Ayah! 🥹✨
    </div>
</div>

<script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const message = document.getElementById("message");

    // Tombol No kabur terus 😆
    noBtn.addEventListener("mouseover", () => {
        const x = Math.random() * 200 - 100;
        const y = Math.random() * 200 - 100;
        noBtn.style.transform = `translate(${x}px, ${y}px)`;
    });

    // Kalau Yes diklik
    yesBtn.addEventListener("click", () => {
        message.style.display = "block";
    });
</script>

</body>
</html>
